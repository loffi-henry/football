<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>世界盃 12 碼 PK 大挑戰</title>
<style>
  /* ============================================================
     設計系統 / DESIGN TOKENS
     Art direction: 「白天球場 × 活力橙」Daylight-Stadium / Vivid-Sport
     晴空藍 + 純白霧面玻璃 + 草綠呼應 + 溫暖琥珀橙強調色
     與明亮白天 3D 球場一致的清爽、運動感調性
     ============================================================ */
  :root{
    /* — 色票 Palette — */
    /* 深底色：用飽和的天空藍家族取代午夜藍，作為文字/標誌的對比底 */
    --sky-900:#0b3a6b;     /* 最深（標誌文字底/票券缺口）*/
    --sky-800:#0f4d8a;
    --sky-700:#1567b0;
    --sky-600:#1f86d6;
    --sky-500:#3b9eff;     /* 主天空藍 */
    --sky-300:#8fcdff;

    --ink:#10243a;          /* 主要文字（深藍灰，落在亮面上）*/
    --ink-dim:#4d6680;      /* 次要文字 */
    --ink-on-dark:#f4f9ff;  /* 落在深色/玻璃上的文字 */
    --ink-on-dark-dim:#bcd4ec;

    /* 暖橙強調（活力、獎勵感；與藍綠白天場景互補）*/
    --gold-100:#fff3da;
    --gold-300:#ffd27a;
    --gold-400:#ffb43d;
    --gold-500:#ff9a1f;
    --gold-600:#e07c00;

    /* 草地（與 3D 場景呼應）*/
    --pitch-500:#3fbf66;
    --pitch-600:#2ea24f;

    /* 狀態色 */
    --save-500:#5a7a99;

    /* 玻璃 HUD — 亮白霧面，而非深色 */
    --glass:rgba(255,255,255,.66);
    --glass-strong:rgba(255,255,255,.82);
    --hairline:rgba(255,255,255,.75);
    --hairline-strong:rgba(15,77,138,.22);

    /* — 字級 Type scale — */
    --t-xs:11px;  --t-sm:13px;  --t-md:15px;
    --t-lg:18px;  --t-xl:24px;  --t-2xl:30px;
    --ff:"PingFang TC","Microsoft JhengHei",system-ui,sans-serif;

    /* — 間距 Spacing scale (4pt) — */
    --s-1:4px; --s-2:8px; --s-3:12px; --s-4:16px;
    --s-5:20px; --s-6:24px; --s-8:32px;

    /* — 圓角 Radius scale — */
    --r-sm:10px; --r-md:14px; --r-lg:20px; --r-xl:28px; --r-pill:999px;

    /* — 陰影 / 高度 Elevation — */
    --e-1:0 2px 8px rgba(11,58,107,.18);
    --e-2:0 8px 22px rgba(11,58,107,.22);
    --e-3:0 16px 40px rgba(11,58,107,.28);
    --e-4:0 28px 70px rgba(11,58,107,.34);
    --glow-gold:0 0 28px rgba(255,154,31,.42);

    /* — 動態語彙 Motion — */
    --ease-out:cubic-bezier(.22,.61,.36,1);
    --ease-spring:cubic-bezier(.2,1.25,.4,1);
    --d-fast:.14s; --d-base:.28s; --d-slow:.5s;
  }

  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;}
  body{
    font-family:var(--ff);
    background:linear-gradient(180deg,#3b9eff 0%,#8fcdff 60%,#dcefff 100%);color:var(--ink);
    user-select:none;-webkit-user-select:none;
    -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
  }
  #app{position:fixed;inset:0;}
  canvas{display:block;width:100%;height:100%;}

  /* 上下泛光暈影，讓 HUD 文字浮出 3D 場景 */
  .hud::before{
    content:"";position:absolute;inset:0;pointer-events:none;z-index:-1;
    background:
      linear-gradient(180deg,rgba(8,40,76,.42) 0%,rgba(8,40,76,0) 20%),
      linear-gradient(0deg,rgba(8,40,76,.34) 0%,rgba(8,40,76,0) 26%);
  }

  /* ===== HUD ===== */
  .hud{position:fixed;inset:0;pointer-events:none;display:flex;flex-direction:column;}
  .topbar{
    display:flex;justify-content:space-between;align-items:flex-start;
    gap:var(--s-3);position:relative;z-index:12;
    padding:calc(var(--s-4) + env(safe-area-inset-top)) var(--s-5) 0;
  }
  /* — 品牌鎖定區 brand lockup — */
  .brand{pointer-events:none;display:flex;flex-direction:column;gap:6px;}
  .brand .kicker{
    display:inline-flex;align-items:center;gap:7px;align-self:flex-start;
    font-size:var(--t-xs);font-weight:800;letter-spacing:3px;
    color:#5a2e00;
    background:linear-gradient(100deg,var(--gold-300),var(--gold-500));
    padding:4px 10px 4px 9px;border-radius:var(--r-pill);
    box-shadow:var(--e-1),inset 0 1px 0 rgba(255,255,255,.5);
  }
  .brand .kicker svg{width:13px;height:13px;display:block;}
  .brand h1{
    font-size:clamp(18px,4.6vw,27px);font-weight:900;letter-spacing:.5px;
    line-height:1.05;color:#fff;
    text-shadow:0 2px 18px rgba(0,0,0,.7);
  }
  .brand h1 b{
    color:var(--gold-300);font-weight:900;
    text-shadow:0 2px 16px rgba(224,124,0,.55);
  }
  .brand .tag{
    font-size:var(--t-xs);color:var(--ink-on-dark-dim);letter-spacing:.5px;
    text-shadow:0 1px 8px rgba(8,40,76,.6);
  }
  .stats{display:flex;gap:var(--s-2);pointer-events:none;}
  .chip{
    position:relative;overflow:hidden;
    background:var(--glass);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
    border:1px solid var(--hairline);
    border-radius:var(--r-md);padding:8px 13px 9px;text-align:center;min-width:66px;
    box-shadow:var(--e-1),inset 0 1px 0 rgba(255,255,255,.6);
  }
  .chip::after{
    content:"";position:absolute;left:0;right:0;top:0;height:2px;
    background:linear-gradient(90deg,transparent,var(--gold-500),transparent);opacity:.7;
  }
  .chip .n{
    font-size:var(--t-xl);font-weight:900;line-height:1;
    font-variant-numeric:tabular-nums;color:var(--gold-600);
    transition:transform var(--d-base) var(--ease-spring);
  }
  .chip .l{font-size:var(--t-xs);color:var(--ink-dim);margin-top:4px;letter-spacing:2px;}
  .chip.bump .n{transform:scale(1.32);}
  .iconbtn{
    pointer-events:auto;cursor:pointer;
    width:44px;height:44px;border-radius:var(--r-pill);
    background:var(--glass);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
    border:1px solid var(--hairline);
    display:flex;align-items:center;justify-content:center;
    color:var(--sky-700);box-shadow:var(--e-1);
    transition:transform var(--d-fast) var(--ease-out),border-color var(--d-base),background var(--d-base);
  }
  .iconbtn:active{transform:scale(.9);}
  @media(hover:hover){.iconbtn:hover{border-color:var(--hairline-strong);background:var(--glass-strong);}}
  .iconbtn svg{width:21px;height:21px;}

  .spacer{flex:1;}

  /* ===== 底部射門控制 ===== */
  .controls{
    pointer-events:auto;
    display:flex;gap:var(--s-3);justify-content:center;align-items:flex-end;
    padding:0 var(--s-4) calc(var(--s-6) + env(safe-area-inset-bottom));
    transition:opacity var(--d-base) var(--ease-out), transform var(--d-base) var(--ease-out);
  }
  .controls.hidden{opacity:0;transform:translateY(34px);pointer-events:none;}
  .aim{
    cursor:pointer;flex:1;max-width:164px;position:relative;overflow:hidden;
    background:linear-gradient(180deg,rgba(255,255,255,.92) 0%,rgba(238,247,255,.9) 100%);
    border:1px solid var(--hairline);
    border-radius:var(--r-lg);padding:16px 10px 14px;text-align:center;
    box-shadow:var(--e-2),inset 0 1px 0 rgba(255,255,255,.7);
    transition:transform var(--d-fast) var(--ease-out),border-color var(--d-base),box-shadow var(--d-base);
    -webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);
  }
  /* 泛光頂緣 */
  .aim::before{
    content:"";position:absolute;left:10%;right:10%;top:0;height:3px;
    background:linear-gradient(90deg,transparent,var(--gold-500),transparent);
    opacity:.9;
  }
  /* 內側微光漸層 */
  .aim::after{
    content:"";position:absolute;inset:0;border-radius:inherit;pointer-events:none;
    background:radial-gradient(120% 80% at 50% -10%,rgba(255,154,31,.14),transparent 60%);
  }
  .aim:active{
    transform:translateY(3px) scale(.96);
    border-color:var(--gold-500);
    box-shadow:0 0 0 1px rgba(255,154,31,.55),var(--e-1),var(--glow-gold);
  }
  @media(hover:hover){.aim:hover{border-color:var(--gold-400);transform:translateY(-3px);box-shadow:var(--e-3),var(--glow-gold);}}
  .aim .goalic{width:52px;height:38px;display:block;margin:0 auto;position:relative;}
  .aim .goalic .frame{stroke:#15406e;stroke-width:2.2;fill:none;stroke-linecap:round;stroke-linejoin:round;}
  .aim .goalic .ground{stroke:rgba(21,64,110,.45);stroke-width:2;stroke-linecap:round;}
  .aim .goalic .net{stroke:rgba(21,64,110,.18);stroke-width:1;fill:none;}
  .aim .goalic .ring{fill:none;stroke:var(--gold-500);stroke-width:1.5;opacity:.55;}
  .aim .goalic .target{fill:var(--gold-500);filter:drop-shadow(0 0 3px rgba(255,154,31,.7));}
  .aim .t{
    font-size:var(--t-md);font-weight:800;margin-top:10px;letter-spacing:3px;
    color:var(--ink);text-shadow:0 1px 0 rgba(255,255,255,.6);
  }
  .prompt{
    position:absolute;left:0;right:0;
    bottom:calc(132px + env(safe-area-inset-bottom));text-align:center;
    font-size:var(--t-xs);letter-spacing:5px;opacity:.95;pointer-events:none;
    color:#fff;text-shadow:0 1px 2px rgba(8,40,76,.55),0 2px 12px rgba(8,40,76,.55);
    font-weight:700;
    transition:opacity var(--d-base) var(--ease-out);
    display:flex;align-items:center;justify-content:center;gap:14px;
  }
  .prompt::before,.prompt::after{
    content:"";width:26px;height:2px;border-radius:2px;
    background:linear-gradient(90deg,transparent,var(--gold-400));
  }
  .prompt::after{background:linear-gradient(90deg,var(--gold-400),transparent);}

  /* ===== 對戰計分板 ===== */
  .scoreboard{display:flex;align-items:center;gap:var(--s-2);pointer-events:none;}
  .team{display:flex;flex-direction:column;align-items:center;gap:3px;}
  .ava{
    width:40px;height:40px;border-radius:var(--r-pill);overflow:hidden;
    background:var(--glass);border:2px solid var(--gold-400);
    display:flex;align-items:center;justify-content:center;box-shadow:var(--e-1);
  }
  .ava svg{width:34px;height:34px;display:block;}
  .flag{
    width:24px;height:15px;border-radius:3px;overflow:hidden;display:flex;
    box-shadow:0 0 0 1px rgba(0,0,0,.35);
  }
  .flag i{flex:1;height:100%;display:block;}
  .who{
    font-size:10px;color:#fff;letter-spacing:1px;font-weight:700;
    text-shadow:0 1px 4px rgba(8,40,76,.6);
  }
  .vs{
    font-size:var(--t-md);font-weight:900;letter-spacing:1px;color:#fff;
    padding:2px var(--s-2);align-self:center;border-radius:var(--r-pill);
    background:linear-gradient(100deg,var(--gold-400),var(--gold-500));
    box-shadow:var(--e-1),inset 0 1px 0 rgba(255,255,255,.4);
  }
  .score{
    display:flex;flex-direction:column;align-items:center;min-width:52px;
    background:var(--glass);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
    border:1px solid var(--hairline);border-radius:var(--r-md);padding:5px 10px;
    box-shadow:var(--e-1);position:relative;
  }
  .score::after{
    content:"";position:absolute;left:0;right:0;top:0;height:2px;
    background:linear-gradient(90deg,transparent,var(--gold-400),transparent);opacity:.6;
  }
  .score b{
    font-size:var(--t-xl);font-weight:900;line-height:1;color:var(--gold-300);
    font-variant-numeric:tabular-nums;
  }
  .score small{font-size:9px;color:var(--ink-dim);letter-spacing:2px;margin-top:4px;}

  /* ===== 結果卡 ===== */
  .result{
    pointer-events:none;
    position:fixed;left:50%;top:50%;transform:translate(-50%,-50%) scale(.86) translateY(8px);
    width:min(86vw,400px);
    border-radius:var(--r-xl);padding:var(--s-8) var(--s-6) var(--s-6);text-align:center;
    box-shadow:var(--e-4);
    opacity:0;
    transition:opacity var(--d-slow) var(--ease-out),
               transform var(--d-slow) var(--ease-spring);
    z-index:20;overflow:hidden;
  }
  .result::before{
    content:"";position:absolute;inset:0;border-radius:inherit;pointer-events:none;
    background:radial-gradient(110% 70% at 50% 0%,rgba(255,255,255,.5),transparent 55%);
  }
  .result.show{pointer-events:auto;opacity:1;transform:translate(-50%,-50%) scale(1) translateY(0);}
  .result.goal{
    background:linear-gradient(160deg,#ffffff 0%,#fff3da 100%);
    border:1px solid rgba(255,154,31,.5);
    box-shadow:var(--e-4),0 0 60px rgba(255,154,31,.32),inset 0 1px 0 rgba(255,255,255,.9);
  }
  .result.save{
    background:linear-gradient(160deg,#ffffff 0%,#e6f1fb 100%);
    border:1px solid var(--hairline-strong);
    box-shadow:var(--e-4),inset 0 1px 0 rgba(255,255,255,.9);
  }
  .result .rbadge{
    display:inline-flex;align-items:center;gap:9px;
    font-size:var(--t-sm);font-weight:900;letter-spacing:5px;
    padding:8px 20px 8px 22px;border-radius:var(--r-pill);
    background:linear-gradient(100deg,var(--gold-400),var(--gold-500));color:#5a2e00;
    box-shadow:0 6px 18px rgba(255,154,31,.45),inset 0 1px 0 rgba(255,255,255,.5);
  }
  .result .rbadge::before{
    content:"";width:9px;height:9px;border-radius:50%;
    background:#5a2e00;box-shadow:0 0 0 3px rgba(90,46,0,.18);
  }
  .result.save .rbadge{
    background:linear-gradient(100deg,var(--sky-600),var(--sky-700));color:#fff;
    box-shadow:0 6px 16px rgba(15,77,138,.35),inset 0 1px 0 rgba(255,255,255,.35);
  }
  .result.save .rbadge::before{background:#fff;box-shadow:0 0 0 3px rgba(255,255,255,.3);}
  .result .big{font-size:var(--t-2xl);font-weight:900;margin-top:var(--s-4);letter-spacing:1px;color:var(--ink);}
  .result.goal .big{
    background:linear-gradient(180deg,var(--gold-600),var(--gold-500));
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  }
  .result .msg{font-size:var(--t-md);color:var(--ink-dim);margin-top:7px;}
  .result.goal .msg{color:#8a5a12;}
  .result .reward{
    margin-top:var(--s-5);position:relative;
    background:linear-gradient(135deg,#fffdf6,#ffe9bf);color:var(--gold-600);
    border-radius:var(--r-md);padding:14px 12px;font-weight:800;font-size:var(--t-sm);
    box-shadow:0 10px 24px rgba(224,124,0,.22),inset 0 0 0 1px rgba(255,154,31,.3);
    letter-spacing:2px;
  }
  /* 票券缺口（與卡片底色一致）*/
  .result .reward::before,.result .reward::after{
    content:"";position:absolute;top:50%;width:16px;height:16px;border-radius:50%;
    background:#fff3da;transform:translateY(-50%);
  }
  .result .reward::before{left:-8px;}
  .result .reward::after{right:-8px;}
  .result .reward .code{
    font-size:var(--t-xl);letter-spacing:4px;margin-top:5px;
    color:var(--gold-600);font-variant-numeric:tabular-nums;
    text-shadow:0 1px 0 rgba(255,255,255,.6);
  }
  .result .again{
    margin-top:var(--s-5);cursor:pointer;width:100%;
    padding:15px;border:none;border-radius:var(--r-md);
    font-size:var(--t-lg);font-weight:800;letter-spacing:1px;
    transition:transform var(--d-fast) var(--ease-out),box-shadow var(--d-base),filter var(--d-base);
  }
  .result.goal .again{
    background:linear-gradient(100deg,var(--gold-400),var(--gold-500));color:#5a2e00;
    box-shadow:0 10px 26px rgba(255,154,31,.45),inset 0 1px 0 rgba(255,255,255,.5);
  }
  .result.save .again{
    background:linear-gradient(100deg,var(--sky-600),var(--sky-700));color:#fff;
    box-shadow:0 10px 26px rgba(15,77,138,.32),inset 0 1px 0 rgba(255,255,255,.3);
  }
  .result .again:active{transform:scale(.97);}
  @media(hover:hover){.result .again:hover{filter:brightness(1.06);}}

  /* ===== 載入 / 錯誤 ===== */
  #loader{
    position:fixed;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:var(--s-5);
    background:linear-gradient(180deg,#3b9eff 0%,#8fcdff 55%,#e8f5ff 100%);
    z-index:50;transition:opacity var(--d-slow);
  }
  .loadmark{
    display:flex;flex-direction:column;align-items:center;gap:var(--s-3);
  }
  .loadmark .lm-title{
    font-size:var(--t-xl);font-weight:900;letter-spacing:1px;color:#fff;
    text-shadow:0 2px 10px rgba(8,40,76,.45);
  }
  .loadmark .lm-title b{color:var(--gold-300);}
  .spinner{
    position:relative;width:54px;height:54px;border-radius:50%;
    border:3px solid rgba(255,255,255,.55);
    border-top-color:var(--gold-400);border-right-color:var(--gold-500);
    animation:spin 1s var(--ease-out) infinite;
    box-shadow:0 0 22px rgba(255,154,31,.3);
  }
  @keyframes spin{to{transform:rotate(360deg);}}
  #loader .lt{font-size:var(--t-sm);color:#eaf5ff;letter-spacing:3px;text-shadow:0 1px 6px rgba(8,40,76,.4);}
  #fallback{display:none;padding:var(--s-6);text-align:center;max-width:380px;line-height:1.7;color:#0d3a66;}
  #fallback b{color:var(--gold-600);font-weight:800;}

  /* 彩帶 */
  .confetti{position:fixed;top:-14px;width:9px;height:15px;z-index:15;pointer-events:none;border-radius:2px;box-shadow:0 1px 3px rgba(0,0,0,.2);}
  @keyframes fall{
    0%{transform:translateY(-20px) rotate(0);opacity:1;}
    100%{transform:translateY(106vh) rotate(760deg);opacity:.85;}
  }
  .flash{
    position:fixed;inset:0;opacity:0;pointer-events:none;z-index:14;
    background:radial-gradient(120% 90% at 50% 42%,#fff 0%,rgba(255,236,200,.85) 45%,rgba(255,236,200,0) 80%);
  }
</style>
</head>
<body>
  <div id="app"></div>

  <div class="hud">
    <div class="topbar">
      <div class="brand">
        <span class="kicker">
          <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M6 3h12v2h2v4a4 4 0 0 1-4 4 5 5 0 0 1-3 1.9V18h3v2H8v-2h3v-3.1A5 5 0 0 1 8 13a4 4 0 0 1-4-4V5h2V3Zm0 4H4v2a2 2 0 0 0 2 2V7Zm12 0v4a2 2 0 0 0 2-2V7h-2Z"/></svg>
          PK CHALLENGE
        </span>
        <h1>世界盃 <b>12 碼</b> PK</h1>
        <div class="tag">騙過守門員，就請你吃一份餐點</div>
      </div>
      <div style="display:flex;align-items:center;gap:10px;">
        <div class="scoreboard">
          <div class="team">
            <div class="ava"><svg viewBox="0 0 32 32" aria-hidden="true"><circle cx="16" cy="17" r="14" fill="#ffcea0"/><path d="M3 13a13 11 0 0 1 26 0z" fill="#e23b4e"/><circle cx="11" cy="18" r="2.1" fill="#1e2732"/><circle cx="21" cy="18" r="2.1" fill="#1e2732"/></svg></div>
            <div class="flag"><i style="background:#e23b4e"></i><i style="background:#fff"></i><i style="background:#1d4ed8"></i></div>
            <div class="who">射手</div>
          </div>
          <div class="vs">VS</div>
          <div class="team">
            <div class="ava"><svg viewBox="0 0 32 32" aria-hidden="true"><circle cx="16" cy="17" r="14" fill="#ffd2a6"/><path d="M3 13a13 11 0 0 1 26 0z" fill="#18c08a"/><circle cx="11" cy="18" r="2.1" fill="#1e2732"/><circle cx="21" cy="18" r="2.1" fill="#1e2732"/></svg></div>
            <div class="flag"><i style="background:#18c08a"></i><i style="background:#fff"></i><i style="background:#eecb63"></i></div>
            <div class="who">門將</div>
          </div>
        </div>
        <div class="iconbtn" id="muteBtn" title="音效開關" aria-label="音效"></div>
      </div>
    </div>

    <div class="spacer"></div>

    <div class="prompt" id="prompt">選擇射門路線</div>
    <div class="controls" id="controls">
      <div class="aim" data-dir="left">

/* ============================================================

   每 BAG_SIZE 球裡，固定有 BAG_WINS 球會進（順序隨機，客人猜不到）。
   例：6 球中 2 球 ≈ 33%。想更省成本→把 BAG_WINS 改小（例 1）。
   想多送一點→把 BAG_WINS 改大（例 3）。

const BAG_SIZE = 6;   // 一輪幾球

// 抽籤袋：洗好一袋進/不進，發完再補新的一袋
let _bag = [];
function refillBag(){
  _bag = [];
  for(let i=0;i<BAG_SIZE;i++) _bag.push(i < BAG_WINS);
  for(let i=_bag.length-1;i>0;i--){              // Fisher–Yates 洗牌
    const j=(Math.random()*(i+1))|0;
    [_bag[i],_bag[j]]=[_bag[j],_bag[i]];
  }
}
function drawShot(){ if(!_bag.length) refillBag(); return _bag.pop(); }

/* ---------- 看台 + 觀眾 ---------- */
function roundRect(x,X,Y,W,H,R){
  x.beginPath();
  x.moveTo(X+R,Y);x.arcTo(X+W,Y,X+W,Y+H,R);x.arcTo(X+W,Y+H,X,Y+H,R);
  x.arcTo(X,Y+H,X,Y,R);x.arcTo(X,Y,X+W,Y,R);x.closePath();
}
function drawFan(x,cx,cy,s,skinC,jerseyC,hairC,flagC,arms){
  // 旗子（部分球迷舉旗）
  if(flagC){
    x.strokeStyle='#7a5a30';x.lineWidth=Math.max(1,s*0.14);
    x.beginPath();x.moveTo(cx+s*0.8,cy);x.lineTo(cx+s*1.05,cy-s*1.9);x.stroke();
    x.fillStyle=flagC;x.fillRect(cx+s*1.05,cy-s*1.9,s*1.1,s*0.75);
  }
  // 身體（圓潤球衣）
  x.fillStyle=jerseyC;
  roundRect(x,cx-s*0.78,cy-s*0.15,s*1.56,s*1.5,s*0.5);x.fill();
  // 舉起的手臂（歡呼）
  if(arms){
    x.strokeStyle=skinC;x.lineWidth=s*0.34;x.lineCap='round';
    x.beginPath();x.moveTo(cx-s*0.6,cy+s*0.2);x.lineTo(cx-s*1.0,cy-s*0.9);x.stroke();
    x.beginPath();x.moveTo(cx+s*0.6,cy+s*0.2);x.lineTo(cx+s*1.0,cy-s*0.9);x.stroke();
  }
  // 頭（Q版大頭）
  x.fillStyle=skinC;
  x.beginPath();x.arc(cx,cy-s*0.55,s*0.8,0,7);x.fill();
  // 頭髮
  x.fillStyle=hairC;
  x.beginPath();x.arc(cx,cy-s*0.72,s*0.82,Math.PI*1.05,Math.PI*1.95);x.fill();
  // 眼睛
  x.fillStyle='#23303f';
  x.beginPath();x.arc(cx-s*0.28,cy-s*0.5,s*0.11,0,7);x.fill();
  x.beginPath();x.arc(cx+s*0.28,cy-s*0.5,s*0.11,0,7);x.fill();
}
function crowdTexture(){
  const w=1280,h=360,c=document.createElement('canvas');c.width=w;c.height=h;
  const x=c.getContext('2d');
  const g=x.createLinearGradient(0,0,0,h);
  g.addColorStop(0,'#33485f');g.addColorStop(.5,'#41586f');g.addColorStop(1,'#536c84');
  x.fillStyle=g;x.fillRect(0,0,w,h);
  const skin=['#ffdbac','#f1c27d','#e0ac69','#c68642','#8d5524'];
  const hair=['#1c1c22','#2b1d12','#4a2f1a','#6b4423','#111'];
  const jersey=['#e11d48','#2563eb','#16a34a','#f59e0b','#ffffff','#7c3aed','#0891b2','#db2777','#0ea5e9'];
  const flag=['#e11d48','#2563eb','#16a34a','#f59e0b','#ffffff'];
  const rows=11;
  // 由後排往前排畫，前排蓋住後排
  for(let r=rows-1;r>=0;r--){
    const depth=r/(rows-1);
    const cy=h-18 - r*((h-40)/rows);
    const s=8.5 - r*0.46;
    const step=s*2.05;
    const offset=((r%2)?step/2:0) + (Math.random()*step*0.3);
    // 後排稍微壓暗（景深）
    x.globalAlpha=1-depth*0.35;
    for(let cx=offset;cx<w+step;cx+=step){
      drawFan(x,cx,cy,s,
        skin[(Math.random()*skin.length)|0],
        jersey[(Math.random()*jersey.length)|0],
        hair[(Math.random()*hair.length)|0],
        Math.random()<0.16?flag[(Math.random()*flag.length)|0]:null,
        Math.random()<0.4);
    }
  }
  x.globalAlpha=1;
  const t=new THREE.CanvasTexture(c);t.anisotropy=8;return t;
}

   重整就會自動取代上面的幾何體角色並播放內嵌動畫；
   沒有檔案時自動沿用幾何體角色（fallback，不報錯）。
   ── 拿到模型後，把下面 clips 改成你 GLB 實際的動畫片段名稱即可 ──
   ============================================================ */
const CHAR_MODELS = {
  kicker: {
    url:'models/Shooter.glb', group:kicker,
    fit:1.55, yaw:Math.PI,          // 面向球門(-Z)；視匯出朝向調整 0 / Math.PI

  },

  }
};
const charRig = { kicker:null, keeper:null };
const gltfLoader = new GLTFLoader();
function loadCharModel(key){
  const cfg=CHAR_MODELS[key];
  gltfLoader.load(cfg.url, gltf=>{
    const model=gltf.scene;
    // 依目標身高自動縮放、對齊底部中心
    let box=new THREE.Box3().setFromObject(model);
    const h=(box.max.y-box.min.y)||1;
    model.scale.setScalar(cfg.fit/h);
    box=new THREE.Box3().setFromObject(model);
    model.position.y-=box.min.y;
    model.rotation.y=cfg.yaw;
    model.traverse(o=>{ if(o.isMesh){o.castShadow=true; o.receiveShadow=false;} });
    // 隱藏幾何體子件，換上 GLB
    cfg.group.children.slice().forEach(c=>{ c.visible=false; });
    cfg.group.add(model);
    const mixer=new THREE.AnimationMixer(model);
    const actions={};
    gltf.animations.forEach(cl=>{ actions[cl.name]=mixer.clipAction(cl); });
    charRig[key]={ mixer, actions, model, cfg, current:null };
    playClip(key, cfg.clips.idle);
    console.info('[model] 已載入', cfg.url, '動畫：', gltf.animations.map(a=>a.name));
  }, undefined, ()=>{
    console.info('[model] 找不到', cfg.url, '→ 使用幾何體角色');
  });
}
function playClip(key, name, opts){
  const rig=charRig[key]; if(!rig||!name) return;
  const act=rig.actions[name]; if(!act) return;
  const once=opts&&opts.once;
  if(rig.current===act && !(opts&&opts.restart)) return;
  act.reset();
  act.setLoop(once?THREE.LoopOnce:THREE.LoopRepeat, once?1:Infinity);
  act.clampWhenFinished=!!once;
  if(rig.current && rig.current!==act) rig.current.fadeOut(0.15);
  act.fadeIn(0.15).play();
  rig.current=act;
}

function ballTexture(){
  const s=256,c=document.createElement('canvas');c.width=c.height=s;
  const x=c.getContext('2d');
  // 微暖白底，避免死白「廉價感」
  x.fillStyle='#f4f6fa'; x.fillRect(0,0,s,s);
  function pent(cx,cy,r,fill){
    x.beginPath();
    for(let i=0;i<5;i++){const a=-Math.PI/2+i*2*Math.PI/5;
      const px=cx+Math.cos(a)*r,py=cy+Math.sin(a)*r;
      i?x.lineTo(px,py):x.moveTo(px,py);}
    x.closePath();
    x.fillStyle=fill;x.fill();
  }
  // 深藍黑五角片 + 細邊，比純黑更精緻
  const dark='#16202e';
  x.lineJoin='round';
  pent(128,128,35,dark);
  for(let i=0;i<5;i++){const a=i*2*Math.PI/5;pent(128+Math.cos(a)*90,128+Math.sin(a)*90,20,dark);}
  pent(30,30,18,dark);pent(226,40,18,dark);pent(40,220,18,dark);pent(220,220,18,dark);
  // 縫線高光
  x.strokeStyle='rgba(255,255,255,.16)';x.lineWidth=1.4;
  pent(128,128,35,'rgba(0,0,0,0)');x.stroke();
  const t=new THREE.CanvasTexture(c);t.anisotropy=8;return t;
}

   遊戲流程

let state='idle';                 // idle | windup | shooting | ended
let shotStart=0, FLIGHT=0.9;
let windupStart=0; const WINDUP=0.4;
let curve=null, isGoalShot=false, resolved=false, shotPower=0.75;
let keeperFrom=new THREE.Vector3(), keeperTo=new THREE.Vector3();
let keeperRotTo=0;


/* ---------- 射門：方向→球門落點 + 力道；結果仍由抽籤袋決定 ---------- */
function shoot(target,power){
  if(state!=='idle') return;
  state='windup'; resolved=false; windupStart=clock.getElapsedTime();
  shotPower=power;
  setAimUI(false);

  isGoalShot = drawShot();
  const ax=target.x, centerAim=Math.abs(ax)<1.0;

  // 守門員：進球→撲錯邊；撲救→撲向球
  keeperFrom.copy(keeper.position);
  let kx;
  if(isGoalShot){
    kx = centerAim ? (Math.random()<.5?-2.6:2.6) : -Math.sign(ax)*2.45;
  }else{
    kx = THREE.MathUtils.clamp(ax,-2.85,2.85);
  }
  keeperTo.set(kx,0,keeper.position.z);
  keeperRotTo = (centerAim && !isGoalShot) ? 0 : -Math.sign(kx||1)*1.1;

  // 香蕉弧線：力道越大越平直、越快
  const p0=BALL_START.clone(), p2=target.clone();
  const bow=ax*0.16, arc=0.9+(1-power)*1.3;
  const p1=new THREE.Vector3((p0.x+p2.x)/2 - bow, Math.max(p2.y,1.1)+arc, (p0.z+p2.z)/2);
  curve=new THREE.QuadraticBezierCurve3(p0,p1,p2);
  FLIGHT=0.72+(1-power)*0.4;

  // GLB 動畫（有載入模型時才有作用）
  playClip('kicker', CHAR_MODELS.kicker.clips.kick, {once:true,restart:true});
  playClip('keeper', kx<0?CHAR_MODELS.keeper.clips.diveL:CHAR_MODELS.keeper.clips.diveR, {once:true,restart:true});
  setCharacterPng('kicker', CHAR_ASSETS.shooterKick);
  setCharacterPng('keeper', kx<0 ? CHAR_ASSETS.keeperDiveLeft : CHAR_ASSETS.keeperDiveRight);
}

function bezierAt(t){return curve.getPoint(t);}

function resolveShot(impact){
  resolved=true;
  if(isGoalShot){
    netRipple(impact);
    cameraShake(0.45,0.18);
    flashScreen(); confetti(); sfx.cheer();
    playClip('kicker', CHAR_MODELS.kicker.clips.celebrate, {once:true,restart:true});
    setCharacterPng('kicker', CHAR_ASSETS.shooterCelebrate);
    setTimeout(()=>showResult(true), 520);

    cameraShake(0.18,0.1);
    sfx.save();
    playClip('keeper', CHAR_MODELS.keeper.clips.save, {once:true,restart:true});
    setCharacterPng('keeper', CHAR_ASSETS.keeperSave);
    deflectStart=clock.getElapsedTime(); deflecting=true;
    deflectFrom=ball.position.clone();
    deflectTo=ball.position.clone().add(new THREE.Vector3((Math.random()-.5)*4,1.5,4));
    setTimeout(()=>showResult(false), 650);
  }
}

/* ---------- 球網凹陷 ---------- */
let ripple=null;
function netRipple(impactWorld){
  ripple={t:0, cx:impactWorld.x, cy:impactWorld.y-GOAL_H/2};
}
function updateNet(dt){
  if(!ripple)return;
  ripple.t+=dt;
  const dur=0.7, p=ripple.t/dur;
  const arr=backNetGeo.attributes.position.array;
  for(let i=0;i<arr.length;i+=3){
    const bx=backNetBase[i], by=backNetBase[i+1];
    const d=Math.hypot(bx-ripple.cx, by-ripple.cy);
    const amp = 0.9*Math.exp(-d*1.4)*Math.exp(-p*4)*Math.cos(d*4 - p*16);
    arr[i+2]=backNetBase[i+2] - Math.max(0,amp*( p<1?1:0 )) - (p<0.5? 0.7*Math.exp(-d*1.2)*(1-p*2):0);
  }
  backNetGeo.attributes.position.needsUpdate=true;
  backNetGeo.computeVertexNormals();
  if(p>=1){ for(let i=0;i<arr.length;i++)arr[i]=backNetBase[i];
    backNetGeo.attributes.position.needsUpdate=true; ripple=null; }
}

/* ---------- 音效（純合成，免外部檔） ---------- */
const sfx=(()=>{
  let ctx,muted=false;
  function ac(){ if(!ctx) ctx=new (window.AudioContext||window.webkitAudioContext)(); return ctx; }
  function tone(f,t,type,dur,vol){
    if(muted)return; const a=ac(); const o=a.createOscillator(),g=a.createGain();
    o.type=type; o.frequency.setValueAtTime(f,a.currentTime+t);
    g.gain.setValueAtTime(vol,a.currentTime+t);
    g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+t+dur);
    o.connect(g).connect(a.destination); o.start(a.currentTime+t); o.stop(a.currentTime+t+dur);
  }
  function noise(t,dur,vol){
    if(muted)return; const a=ac(); const b=a.createBuffer(1,a.sampleRate*dur,a.sampleRate);
    const d=b.getChannelData(0); for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*(1-i/d.length);
    const s=a.createBufferSource(); s.buffer=b; const g=a.createGain();
    g.gain.value=vol; const f=a.createBiquadFilter(); f.type='bandpass'; f.frequency.value=1200;
    s.connect(f).connect(g).connect(a.destination); s.start(a.currentTime+t);
  }
  return {
    kick(){tone(150,0,'sine',.18,.5);tone(90,0,'triangle',.12,.4);},
    save(){tone(110,0,'square',.18,.3);},
    cheer(){noise(0,1.1,.35); for(let i=0;i<6;i++)tone(500+i*120,i*.04,'sine',.5,.06);},
    toggle(){muted=!muted; return muted;}
  };
})();

/* ---------- 主迴圈 ---------- */
const clock=new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  const dt=Math.min(clock.getDelta(),0.05);
  const time=clock.getElapsedTime();

  // GLB 角色動畫混合器
  if(charRig.kicker) charRig.kicker.mixer.update(dt);
  if(charRig.keeper) charRig.keeper.mixer.update(dt);

  // 守門員待命搖擺
  if(state==='idle'){
    keeper.position.x=Math.sin(time*1.6)*0.35;
    keeper.rotation.z=Math.sin(time*1.6)*0.05;
  }

  // 助跑蓄力
  if(state==='windup'){
    const wt=Math.min((time-windupStart)/WINDUP,1);
    animateKicker(wt);
    if(wt>=1){ state='shooting'; shotStart=time; sfx.kick(); }
  }

  if(state==='shooting'){
    const t=Math.min((time-shotStart)/FLIGHT,1);
    const p=bezierAt(t);
    ball.position.copy(p);
    ball.rotation.x-=0.4; ball.rotation.y-=0.2;
    const kt=THREE.MathUtils.smoothstep(t,0.12,0.78);
    keeper.position.x=THREE.MathUtils.lerp(keeperFrom.x,keeperTo.x,kt);
    keeper.position.y=Math.sin(kt*Math.PI)*0.5*(Math.abs(keeperTo.x)>0.5?1:0.4);
    keeper.rotation.z=keeperRotTo*kt;
    if(t>=1 && !resolved) resolveShot(ball.position.clone());
  }


  if(deflecting){
    const t=Math.min((time-deflectStart)/0.6,1);
    ball.position.lerpVectors(deflectFrom,deflectTo,t);
    ball.rotation.x-=0.3;
    if(t>=1) deflecting=false;
  }

  updateNet(dt);

  // 球影跟隨
  ballShadow.position.set(ball.position.x,0.012,ball.position.z);
  const sc=THREE.MathUtils.clamp(1-(ball.position.y-BALL_R)*0.15,0.4,1);
  ballShadow.scale.set(sc,sc,sc);
  ballShadow.material.opacity=0.28*sc;

  // 鏡頭震動
  camera.position.copy(CAM_BASE);
  if(shake.t<shake.dur){
    shake.t+=dt; const k=shake.amp*(1-shake.t/shake.dur);
    camera.position.x+=(Math.random()-.5)*k*2;
    camera.position.y+=(Math.random()-.5)*k*2;
  }
  // 待命時鏡頭微呼吸
  camera.position.x+=Math.sin(time*0.5)*0.08;
  camera.lookAt(0,1.2,0);

  renderer.render(scene,camera);
}

function resize(){
  const w=innerWidth,h=innerHeight;
  renderer.setSize(w,h);
  camera.aspect=w/h; camera.updateProjectionMatrix();
}
addEventListener('resize',resize); resize();

// 啟動
animate();
setTimeout(()=>{ loader.style.opacity='0'; setTimeout(()=>loader.style.display='none',600); }, 500);
</script>
</body>
